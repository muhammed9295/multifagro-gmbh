<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multifagro - Professional Moving & Packing Services</title>
    <meta name="description" content="Get instant quotes from verified movers. Stress-free relocation with transparent pricing, insured crews, and full packing services." />
    <meta name="author" content="Multifagro" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

    <meta property="og:title" content="Multifagro - Professional Moving & Packing Services" />
    <meta property="og:description" content="Get instant quotes from verified movers. Stress-free relocation with transparent pricing, insured crews, and full packing services." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/logo.png" />
  </head>

  <body>
    <!-- Hidden forms for Netlify bot detection -->
    <form name="quote-request" data-netlify="true" hidden>
      <input type="text" name="fromAddress" />
      <input type="text" name="toAddress" />
      <input type="text" name="moveSize" />
      <input type="text" name="floors" />
      <input type="checkbox" name="elevator" />
      <input type="checkbox" name="packing" />
      <input type="checkbox" name="unpacking" />
      <input type="checkbox" name="boxes" />
      <input type="checkbox" name="cleaning" />
      <input type="date" name="moveDate" />
      <input type="text" name="timeWindow" />
      <textarea name="notes"></textarea>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
    </form>

    <form name="contact-form" data-netlify="true" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
